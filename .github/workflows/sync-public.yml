name: Sync Public Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Filter & Push to Public
    runs-on: ubuntu-latest
    # Only runs in dtax-private, not in dtax public
    if: github.repository == 'dTaxLab/dtax-private'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Filter to open-source paths only
        run: |
          git-filter-repo \
            --path packages/ \
            --path docs/ \
            --path package.json \
            --path pnpm-workspace.yaml \
            --path tsconfig.json \
            --path turbo.json \
            --path .gitignore \
            --path LICENSE \
            --path LICENSE-COMMERCIAL \
            --path README.md \
            --path CONTRIBUTING.md \
            --path SECURITY.md \
            --path .github/ \
            --force

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com" > ~/.git-credentials
          git remote add public https://github.com/dTaxLab/dtax.git
          git push public main --force
