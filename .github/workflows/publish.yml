name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: |
          pnpm --filter @dtax/tax-engine exec tsc --noEmit
          pnpm --filter @dtax/cli exec tsc --noEmit

      - name: Test
        run: |
          pnpm --filter @dtax/tax-engine run test
          pnpm --filter @dtax/cli run test

      - name: Build
        run: pnpm run build

      - name: Publish @dtax/shared-types
        run: pnpm --filter @dtax/shared-types publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @dtax/tax-engine
        run: pnpm --filter @dtax/tax-engine publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @dtax/cli
        run: pnpm --filter @dtax/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
