# Docker Compose for DTax Development
# Start with: docker compose -f docker/docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: dtax-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dtax
      POSTGRES_PASSWORD: dtax_dev_password
      POSTGRES_DB: dtax
    volumes:
      - dtax-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dtax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dtax-redis-data:/data

volumes:
  dtax-postgres-data:
  dtax-redis-data:
